<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading Pro | Live Dashboard</title>
    
    <!-- 1. POPUNDER SCRIPT (Head mein rahega) -->
    <script src="https://eminentpercentvandalism.com/ec/e7/63/ece7635654a65b4fe1d939ed6ff10741.js"></script>

    <style>
        body {
            background-color: #0b0f1a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Invisible Layer for Popunder Trigger */
        #ad-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            background: rgba(0,0,0,0);
            cursor: pointer;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        h1 {
            color: #f0b90b; /* Binance Yellow theme */
            margin-bottom: 20px;
            font-size: 2rem;
        }

        /* TradingView Chart Container */
        #chart-section {
            width: 100%;
            height: 500px;
            border: 2px solid #2d343f;
            border-radius: 15px;
            overflow: hidden;
            background: #131722;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Subscribe Section */
        .subscribe-box {
            margin-top: 50px;
            padding: 30px;
            background: #1e2329;
            border-radius: 20px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        #sub-btn {
            background: #f04444;
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(240, 68, 68, 0.3);
        }

        /* Blur logic for Lock State */
        .is-locked {
            filter: blur(6px);
            opacity: 0.6;
            cursor: not-allowed !important;
            pointer-events: none;
        }

        #timer-msg {
            margin-top: 15px;
            font-size: 1rem;
            color: #94a3b8;
        }

        #seconds {
            color: #f0b90b;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .unlocked-msg {
            color: #22c55e !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Ye invisible layer pehle click par popunder ad chalayegi -->
    <div id="ad-overlay" onclick="startExperience()"></div>

    <div class="container">
        <h1>Real-Time Crypto Trading Chart</h1>

        <!-- LIVE TRADING CHART -->
        <div id="chart-section">
            <div id="tradingview_widget"></div>
        </div>

        <!-- SUBSCRIBE BUTTON SECTION -->
        <div class="subscribe-box">
            <button id="sub-btn" class="is-locked">YouTube Video Locked</button>
            <p id="timer-msg">Wait <span id="seconds">10</span> seconds to unlock video...</p>
        </div>
    </div>

    <!-- TRADINGVIEW SCRIPT -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // Chart Initialize
        new TradingView.widget({
            "width": "100%",
            "height": 500,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_widget"
        });

        // Function: Jab user pehli baar kahin bhi click karega
        function startExperience() {
            document.getElementById('ad-overlay').style.display = 'none';
            console.log("Overlay removed, Popunder triggered.");
        }

        // TIMER LOGIC
        let timeLeft = 10;
        const btn = document.getElementById('sub-btn');
        const timerDisplay = document.getElementById('seconds');
        const timerMsg = document.getElementById('timer-msg');

        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                btn.classList.remove('is-locked');
                btn.textContent = "Watch YouTube Video Now";
                btn.style.background = "#22c55e"; // Green color when unlocked
                timerMsg.innerHTML = "<span class='unlocked-msg'>Link Unlocked! Click the button above.</span>";
            }
        }, 1000);

        // BUTTON CLICK ACTION
        btn.onclick = function() {
            if (timeLeft <= 0) {
                // 1. Smartlink Ad (Naye Tab mein khulega - Earning)
                window.open("https://eminentpercentvandalism.com/p35s5q96?key=77070273e5a947f730f950dfed2ae74b", "_blank");

                // 2. YouTube Video (Isi tab mein khulegi)
                // Yahan apna YouTube Link paste karein:
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; 
            }
        };
    </script>

    <!-- 2. SOCIAL BAR SCRIPT (Body ke end mein - Sahi placement) -->
    <script src="https://eminentpercentvandalism.com/02/c8/b5/02c8b518b76f7eb30d1c02d1b5ba6208.js"></script>

</body>
</html>
