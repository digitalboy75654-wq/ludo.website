<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Reward - Ads</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00d2d3; --neon-gold: #f1c40f; --bg-dark: #0f0c29; }
        body { margin: 0; background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        
        .ad-card { 
            width: 90%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(15px); 
            border: 2px solid var(--neon-blue); 
            border-radius: 25px; 
            padding: 40px 20px; 
            box-shadow: 0 0 40px rgba(0, 210, 211, 0.2); 
        }

        #ad-placeholder {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px dashed var(--neon-blue);
        }

        .watch-btn {
            background: linear-gradient(45deg, var(--neon-blue), #00a8ff);
            color: black;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Orbitron';
            box-shadow: 0 0 15px var(--neon-blue);
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .watch-btn:active { transform: scale(0.95); }

        .timer-display { 
            font-family: 'Orbitron'; 
            font-size: 3.5rem; 
            color: var(--neon-gold); 
            margin: 20px 0; 
            display: none;
        }

        .claim-btn { 
            display: none; 
            background: linear-gradient(45deg, #2ecc71, #27ae60); 
            color: white; 
            border: none; 
            padding: 18px 45px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Orbitron'; 
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4); 
        }

        #cooldown-area { display: none; }
        #status-msg { margin-top: 15px; font-size: 1rem; color: #00d2d3; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ad-card">
        <h2 style="font-family:'Orbitron'; color:var(--neon-blue); letter-spacing: 2px;">REWARD SYSTEM</h2>
        
        <div id="ad-area">
            <div id="ad-placeholder">
                <i class="fas fa-play-circle" style="font-size: 3rem; color: var(--neon-blue); margin-bottom: 10px;"></i>
                <p>Click below to open Ad & Start Timer</p>
                
                <a href="https://eminentpercentvandalism.com/p35s5q96?key=77070273e5a947f730f950dfed2ae74b" 
                   target="_blank" 
                   id="watchBtn" 
                   class="watch-btn">
                    WATCH AD
                </a>
            </div>

            <div class="timer-display" id="timer">20</div>
            <button class="claim-btn" id="claimBtn">CLAIM ₹5</button>
        </div>

        <div id="cooldown-area">
            <i class="fas fa-clock" style="font-size: 3rem; color: #f1c40f; margin-bottom: 10px;"></i>
            <h3>COOLDOWN ACTIVE</h3>
            <p>Next reward available in:</p>
            <div class="timer-display" id="cooldown-timer" style="display:block;">00:00</div>
            <button onclick="window.location.href='home.html'" style="background:transparent; border:1px solid white; color:white; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top: 15px;">Back to Home</button>
        </div>

        <p id="status-msg">Connecting to Server...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY",
            authDomain: "ludo-d46ab.firebaseapp.com",
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com",
            projectId: "ludo-d46ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        const cooldownTime = 60 * 60 * 1000; // 1 Hour

        const watchBtn = document.getElementById('watchBtn');
        const timerEl = document.getElementById('timer');
        const claimBtn = document.getElementById('claimBtn');
        const statusEl = document.getElementById('status-msg');
        const adArea = document.getElementById('ad-area');
        const cooldownArea = document.getElementById('cooldown-area');
        const cooldownTimerEl = document.getElementById('cooldown-timer');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                checkUserStatus(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function checkUserStatus(uid) {
            const userRef = ref(db, 'users/' + uid);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                const lastTime = data.last_ad_time || 0;
                const now = Date.now();
                const diff = cooldownTime - (now - lastTime);

                if (diff > 0) {
                    adArea.style.display = 'none';
                    cooldownArea.style.display = 'block';
                    statusEl.innerText = "Please wait for cooldown.";
                    
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    cooldownTimerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                } else {
                    adArea.style.display = 'block';
                    cooldownArea.style.display = 'none';
                    statusEl.innerText = "Ready to reward!";
                }
            });
        }

        // Timer Function
        function startAdTimer() {
            let adTimeLeft = 20;
            statusEl.innerText = "Ad opened! Timer started...";
            
            const interval = setInterval(() => {
                adTimeLeft--;
                timerEl.innerText = adTimeLeft;
                
                if (adTimeLeft <= 0) {
                    clearInterval(interval);
                    timerEl.style.display = 'none';
                    claimBtn.style.display = 'inline-block';
                    statusEl.innerText = "Task Complete! Claim your Reward.";
                }
            }, 1000);
        }

        // Click Event Handling
        watchBtn.addEventListener('click', () => {
            // UI Switch
            document.getElementById('ad-placeholder').style.display = 'none';
            timerEl.style.display = 'block';
            
            // Start Timer
            startAdTimer();
        });

        claimBtn.onclick = async () => {
            if (!currentUser) return;
            
            claimBtn.disabled = true;
            claimBtn.innerText = "WAIT...";
            statusEl.innerText = "Updating your wallet...";
            
            const userRef = ref(db, 'users/' + currentUser.uid);
            try {
                const snap = await get(userRef);
                const data = snap.val();
                
                // Fixed: Ensuring balance is treated as a Number
                const currentBalance = Number(data.balance) || 0;
                const newBalance = currentBalance + 5;
                
                await update(userRef, {
                    balance: newBalance,
                    last_ad_time: Date.now()
                });

                alert("Successfully earned ₹5! 🪙");
                // The onValue listener will automatically switch to cooldown view
            } catch (e) {
                console.error(e);
                alert("Server Error. Please try again later.");
                claimBtn.disabled = false;
                claimBtn.innerText = "CLAIM ₹5";
            }
        };
    </script>
</body>
</html>
