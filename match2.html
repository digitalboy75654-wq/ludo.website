<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Pro - Real Multiplayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #1e0515, #000000); 
            color: white; font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }
        
        .radar-container { position: relative; width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; }
        .radar { width: 100%; height: 100%; border: 2px solid #00d2d3; border-radius: 50%; position: absolute; box-shadow: 0 0 30px rgba(0, 210, 211, 0.3); }
        .radar::after { content: ''; position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: #00d2d3; transform-origin: left; animation: scan 1.0s linear infinite; box-shadow: 0 0 10px #00d2d3; }
        .match-info { z-index: 10; text-align: center; }
        .count-text { font-family: 'Orbitron'; font-size: 30px; color: white; text-shadow: 0 0 10px #00d2d3; }
        .room-id-display { font-size: 11px; color: #aaa; margin-top: 5px; font-family: monospace; }

        @keyframes scan { to { transform: rotate(360deg); } }
        
        .slots { display: flex; gap: 40px; margin-top: 20px; }
        .slot { width: 100px; height: 130px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px dashed #555; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; position: relative; }
        .slot.filled { border: 2px solid #00d2d3; background: rgba(0, 210, 211, 0.1); transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 210, 211, 0.2); }
        .slot img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 10px; object-fit: cover; }
        .slot-name { font-size: 12px; font-weight: 600; text-align: center; width: 90px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        /* READY BADGE STYLING */
        .ready-badge { position: absolute; top: 55px; background: #2ecc71; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; border: 2px solid #000; display: none; z-index: 5; }

        .vs-text { font-family: 'Orbitron'; font-size: 28px; color: #f1c40f; align-self: center; margin-top: -20px; text-shadow: 0 0 10px #f1c40f; }

        .loader-dots { display: flex; gap: 4px; margin-top: 10px; }
        .dot { width: 6px; height: 6px; background: #00d2d3; border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { to { transform: translateY(-5px); opacity: 0.3; } }

        .status-box { margin-top: 50px; text-align: center; height: 40px; }
        .status-text { color: #00d2d3; font-weight: 600; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }

        /* BUTTONS STYLING */
        .btn-container { margin-top: 20px; display: flex; gap: 15px; }
        .cancel-btn { padding: 12px 30px; border: 1px solid #ff4757; color: #ff4757; background: transparent; border-radius: 30px; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.3s; letter-spacing: 1px; }
        .cancel-btn:hover { background: #ff4757; color: white; box-shadow: 0 0 15px #ff4757; }
        
        .ready-btn { padding: 12px 30px; border: 1px solid #2ecc71; color: #2ecc71; background: transparent; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 800; transition: 0.3s; letter-spacing: 1px; display: none; }
        .ready-btn:hover:not(:disabled) { background: #2ecc71; color: white; box-shadow: 0 0 15px #2ecc71; }
        .ready-btn:disabled { border-color: #555; color: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="radar-container">
        <div class="radar"></div>
        <div class="match-info">
            <div class="count-text" id="joined-count">0/2</div>
            <div class="room-id-display" id="room-id-disp">Checking...</div>
        </div>
    </div>

    <div class="slots">
        <div class="slot" id="slot-0"><div class="loader-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
        <div class="vs-text">VS</div>
        <div class="slot" id="slot-1"><div class="loader-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    </div>

    <div class="status-box">
        <div class="status-text" id="status-text">Connecting...</div>
    </div>

    <div class="btn-container">
        <button class="cancel-btn" id="cancel-action">CANCEL MATCH</button>
        <button class="ready-btn" id="ready-action">I AM READY</button>
    </div>
    
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, set, runTransaction, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
        authDomain: "ludo-d46ab.firebaseapp.com", 
        databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
        projectId: "ludo-d46ab" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const ENTRY_FEE = parseInt(urlParams.get('entry')) || 0; 
    
    // ✨ FIX 1: URL se Private Room ID (gameId) nikalna
    const PRIVATE_ROOM_ID = urlParams.get('gameId'); 
    
    let currentUser = null;
    let myRoomId = null;

    onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;
    window.history.pushState(null, null, window.location.href);
    
    // ✨ NAYA LOGIC: Sab se pehle purana sara data clean karo
    await cleanMyOldRooms();

    if (PRIVATE_ROOM_ID) {
        joinRoom(PRIVATE_ROOM_ID); 
    } else {
        findStrictMatch(); 
    }
});
// ✨ GLOBAL CLEANUP FUNCTION
async function cleanMyOldRooms() {
    document.getElementById('status-text').innerText = "Cleaning old data...";
    const poolRef = ref(db, `matchmaking_pool`);
    
    let snap = await get(poolRef);
    if (snap.exists()) {
        const allFees = snap.val();
        for (const fee in allFees) {
            const rooms = allFees[fee];
            for (const roomId in rooms) {
                const room = rooms[roomId];
                if (room.players && room.players[currentUser.uid]) {
                    // Purane room se apni ID nikalo
                    await remove(ref(db, `matchmaking_pool/${fee}/${roomId}/players/${currentUser.uid}`));
                    
                    // Agar room khali ho gaya toh room bhi delete kar do
                    if (room.players && Object.keys(room.players).length <= 1) { 
                        await remove(ref(db, `matchmaking_pool/${fee}/${roomId}`));
                    }
                }
            }
        }
    }
}
    async function findStrictMatch() {
        document.getElementById('status-text').innerText = "Cleaning old data...";
        const poolRef = ref(db, `matchmaking_pool/${ENTRY_FEE}`);
        
        let snap = await get(poolRef);
        if (snap.exists()) {
            const rooms = snap.val();
            for (const roomId in rooms) {
                const room = rooms[roomId];
                if (room.players && room.players[currentUser.uid]) {
                    await remove(ref(db, `matchmaking_pool/${ENTRY_FEE}/${roomId}/players/${currentUser.uid}`));
                    if (room.players && Object.keys(room.players).length <= 1) { 
                        await remove(ref(db, `matchmaking_pool/${ENTRY_FEE}/${roomId}`));
                    }
                }
            }
        }

        document.getElementById('status-text').innerText = "Searching Rooms...";
        snap = await get(poolRef); 
        
        let targetRoomId = null;
        let maxIndex = 0;

        if (snap.exists()) {
            const rooms = snap.val();
            for (const roomId in rooms) {
                const cleanId = roomId.toLowerCase(); 
                const idx = parseInt(cleanId.split('_')[1]) || 0;
                if(idx > maxIndex) maxIndex = idx;

                const room = rooms[roomId];
                const pCount = room.players ? Object.keys(room.players).length : 0;
                if (pCount < 2) {
                    targetRoomId = cleanId; 
                    break; 
                }
            }
        }

        const finalRoomId = targetRoomId ? targetRoomId : `room_${maxIndex + 1}`;
        joinRoom(finalRoomId);
    }

    async function joinRoom(roomId) {
        myRoomId = roomId;
        document.getElementById('status-text').innerText = `Joining ${roomId}...`;
        
        const roomRef = ref(db, `matchmaking_pool/${ENTRY_FEE}/${roomId}`);

        const result = await runTransaction(roomRef, (roomData) => {
            if (!roomData) {
                return {
                    status: 'waiting',
                    createdAt: Date.now(),
                    gameState: { 
                        tokens: { red: [0,0,0,0], yellow: [0,0,0,0] },
                        turn: 'red',
                        winner: null
                    },
                    players: {
                        [currentUser.uid]: {
                            uid: currentUser.uid,
                            name: currentUser.displayName || "Player",
                            photo: currentUser.photoURL || "https://i.pravatar.cc/150",
                            color: 'red',
                            ready: false 
                        }
                    }
                };
            }

            if (roomData.players && roomData.players[currentUser.uid]) return; 

            const pCount = roomData.players ? Object.keys(roomData.players).length : 0;
            
            if (pCount < 2) {
                if (!roomData.players) roomData.players = {};

                if (pCount === 0) {
                     roomData.gameState = {
                        tokens: { red: [0,0,0,0], yellow: [0,0,0,0] },
                        turn: 'red',
                        winner: null
                    };
                }

                roomData.players[currentUser.uid] = {
                    uid: currentUser.uid,
                    name: currentUser.displayName || "Player",
                    photo: currentUser.photoURL || "https://i.pravatar.cc/150",
                    color: pCount === 0 ? 'red' : 'yellow',
                    ready: false 
                };
                return roomData;
            }
            return; 
        });

        if (result.committed || result.snapshot.exists()) {
            document.getElementById('room-id-disp').innerText = `ID: ${roomId}`;
            
            const myPlayerRef = ref(db, `matchmaking_pool/${ENTRY_FEE}/${roomId}/players/${currentUser.uid}`);
            onDisconnect(myPlayerRef).remove(); 

            listenToRoom(roomId);
        } else {
            // Agar Private room fail ho jaye, toh naya search karein (lekin thoda delay karke)
            setTimeout(findStrictMatch, 500);
        }
    }

    function listenToRoom(roomId) {
        const roomRef = ref(db, `matchmaking_pool/${ENTRY_FEE}/${roomId}`);
        onValue(roomRef, async (snap) => {
            const data = snap.val();
            if (!data || !data.players) return; 

            const playersList = Object.values(data.players);
            const count = playersList.length;

            document.getElementById('joined-count').innerText = `${count}/2`;
            updateSlots(playersList);

            if (count === 1) {
                document.getElementById('status-text').innerText = "Waiting for Opponent...";
                document.getElementById('status-text').style.color = "#00d2d3";
                document.getElementById('cancel-action').style.display = 'block';
                document.getElementById('ready-action').style.display = 'none';
                
                if (data.players[currentUser.uid].ready) {
                    await set(ref(db, `matchmaking_pool/${ENTRY_FEE}/${roomId}/players/${currentUser.uid}/ready`), false);
                }
            }

            if (count === 2) {
                document.getElementById('cancel-action').style.display = 'none'; 
                document.getElementById('ready-action').style.display = 'block';
                window.onpopstate = null; 

                const me = data.players[currentUser.uid];
                const opp = playersList.find(p => p.uid !== currentUser.uid);

                if (me.ready) {
                    document.getElementById('ready-action').innerText = "WAITING...";
                    document.getElementById('ready-action').disabled = true;
                    document.getElementById('status-text').innerText = opp.ready ? "STARTING MATCH..." : "WAITING FOR OPPONENT TO READY...";
                } else {
                    document.getElementById('ready-action').innerText = "I AM READY";
                    document.getElementById('ready-action').disabled = false;
                    document.getElementById('status-text').innerText = opp.ready ? "OPPONENT IS READY! CLICK READY TO START!" : "OPPONENT FOUND! CLICK READY!";
                }

                // ✨ FIX 3: FEE DEDUCTION LOGIC
                if (me.ready && opp && opp.ready) {
                    document.getElementById('status-text').innerText = "FEE DEDUCTED! STARTING...";
                    document.getElementById('status-text').style.color = "#2ecc71";
                    document.getElementById('ready-action').style.display = 'none';
                    
                    if (!window.feeDeducted) {
                        window.feeDeducted = true;
                        
                        const myPlayerRef = ref(db, `matchmaking_pool/${ENTRY_FEE}/${roomId}/players/${currentUser.uid}`);
                        onDisconnect(myPlayerRef).cancel(); 

                        if (ENTRY_FEE > 0) {
                            await runTransaction(ref(db, `users/${currentUser.uid}/balance`), (bal) => {
                                let current = Number(bal || 0);
                                return current >= ENTRY_FEE ? current - ENTRY_FEE : current;
                            });
                        }

                        setTimeout(() => {
                            window.location.href = `game2.html?gameId=${roomId.toLowerCase()}&entry=${ENTRY_FEE}`;
                        }, 1500);
                    }
                }
            }
        });
    }

    function updateSlots(players) {
        players.sort((a,b) => a.color === 'red' ? -1 : 1);

        for(let i=0; i<2; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (players[i]) {
                let badgeHTML = players[i].ready ? `<div class="ready-badge" style="display:block;">READY</div>` : '';
                slot.innerHTML = `
                    <img src="${players[i].photo}">
                    ${badgeHTML}
                    <div class="slot-name">${players[i].name}</div>
                `;
                slot.classList.add('filled');
            } else {
                slot.innerHTML = '<div class="loader-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
                slot.classList.remove('filled');
            }
        }
    }

    document.getElementById('ready-action').onclick = async function() {
        if (!currentUser || !myRoomId) return;
        document.getElementById('ready-action').innerText = "LOADING...";
        await set(ref(db, `matchmaking_pool/${ENTRY_FEE}/${myRoomId}/players/${currentUser.uid}/ready`), true);
    };

    document.getElementById('cancel-action').onclick = function() {
        triggerCancelAndRefund();
    };

    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        window.history.pushState(null, null, window.location.href);
        const status = document.getElementById('status-text').innerText;
        if (status.includes("OPPONENT FOUND") || status.includes("READY")) {
            return; 
        }
        triggerCancelAndRefund();
    };

    async function triggerCancelAndRefund() {
        if (!currentUser || !myRoomId) {
            window.location.href = "home.html";
            return;
        }

        if (confirm("Cancel matchmaking and go back?")) {
            document.getElementById('status-text').innerText = "CANCELLING...";
            document.getElementById('cancel-action').disabled = true;

            try {
                await remove(ref(db, `matchmaking_pool/${ENTRY_FEE}/${myRoomId}/players/${currentUser.uid}`));
                
                const snap = await get(ref(db, `matchmaking_pool/${ENTRY_FEE}/${myRoomId}/players`));
                if (!snap.exists()) {
                    await remove(ref(db, `matchmaking_pool/${ENTRY_FEE}/${myRoomId}`));
                }
            } catch (e) { 
                console.error("Cancel Error:", e); 
            }
            
            window.location.href = "home.html";
        }
    }
</script>
    <script src="script.js"></script>
</body>
</html>
